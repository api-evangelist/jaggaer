apis:
- name: JAGGAER ASO Customer Host Entity Service API
  description: 'The Customer Host Entity Service (CHES) API provides system-to-system
    REST endpoints for managing customer hosts, users, events, and templates within
    the JAGGAER Advanced Sourcing Optimizer platform. It enables creation and retrieval
    of sourcing events, template management, user administration, and location-based
    rate structure queries using OAuth 2.0 bearer tokens combined with API key authentication.

    '
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://asodocs.jaggaer.com/ches.html
