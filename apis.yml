aid: jaggaer
name: JAGGAER
description: 'JAGGAER is an AI-powered procurement and supplier management platform
  serving 1,400+ enterprises worldwide, managing $2.9 trillion in annual spend and
  connecting 13 million suppliers globally. The platform provides REST APIs for sourcing
  optimization, contract management, supplier information management, purchasing,
  and spend analytics. JAGGAER''s Advanced Sourcing Optimizer (ASO) APIs enable system-to-system
  integration using OAuth 2.0 bearer tokens and API keys to automate procurement workflows
  across source-to-pay and procure-to-pay use cases. The platform integrates with
  40+ ERP systems including SAP, Oracle, Workday, and Microsoft Dynamics, supporting
  bidirectional communications for enterprise procurement automation.

  '
