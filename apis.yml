  - url: graphql/jaggaer-graphql.md
    type: GraphQL
- name: JAGGAER ASO Event Entity Service API
  description: 'The Event Entity Service (EES) API provides REST endpoints for managing
    sourcing events within the JAGGAER Advanced Sourcing Optimizer, including event
    attributes, bids, and award scenarios. It supports asynchronous operations for
    retrieving large datasets such as bid submissions and award results, with pre-signed
    download URLs for completed asynchronous processes. Authentication requires both
    OAuth 2.0 bearer tokens and API key headers.

    '
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://asodocs.jaggaer.com/ees.html
  baseURL: https://ees.aso-api.jaggaer.com/
  tags:
  - Sourcing
  - Events
  - Bids
  - Awards
  - Attributes
  properties:
