    url: https://asodocs.jaggaer.com/ees.html
  - type: OpenAPI
    url: https://raw.githubusercontent.com/api-evangelist/jaggaer/refs/heads/main/openapi/jaggaer-aso-ees-openapi.yml
- name: JAGGAER ASO Quay Optimization API
  description: 'The Quay API provides REST endpoints for submitting, managing, and
    tracking optimization jobs within the JAGGAER Advanced Sourcing Optimizer platform.
    It supports job submission for sourcing optimization scenarios, job cancellation,
    and status monitoring with customer-specific daily and absolute rate limits enforced
    via HTTP 429 responses. Authentication is performed using API key headers for
    all operations.

    '
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
