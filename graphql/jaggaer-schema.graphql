# ─── Notification Types ──────────────────────────────────────────────────────

type Notification {
  id: ID!
  recipient: User!
  subject: String!
  message: String!
  channel: NotificationChannel!
  read: Boolean!
  entityType: String
  entityId: ID
  sentAt: DateTime!
}

