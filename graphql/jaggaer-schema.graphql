# ─── Query Root ───────────────────────────────────────────────────────────────

type Query {
  # Suppliers
  supplier(id: ID!): Supplier
  supplierByCode(code: String!): Supplier
  suppliers(filter: SupplierFilterInput, first: Int, after: String, last: Int, before: String): SupplierConnection!
  supplierCategories: [Category!]!
  supplierCertifications(supplierId: ID!): [SupplierCertification!]!
  supplierScorecard(supplierId: ID!): SupplierScorecard

  # Sourcing Events
  sourcingEvent(id: ID!): SourcingEvent
  sourcingEvents(filter: SourcingEventFilterInput, first: Int, after: String, last: Int, before: String): SourcingEventConnection!
  bid(id: ID!): Bid
  bidsForEvent(eventId: ID!): [Bid!]!
  awardScenario(id: ID!): AwardScenario
  awardScenariosForEvent(eventId: ID!): [AwardScenario!]!

  # Contracts
  contract(id: ID!): Contract
  contractByNumber(contractNumber: String!): Contract
  contracts(filter: ContractFilterInput, first: Int, after: String, last: Int, before: String): ContractConnection!
  expiringContracts(daysAhead: Int!): [Contract!]!

  # Purchase Orders
  purchaseOrder(id: ID!): PurchaseOrder
  purchaseOrderByNumber(poNumber: String!): PurchaseOrder
  purchaseOrders(filter: PurchaseOrderFilterInput, first: Int, after: String, last: Int, before: String): PurchaseOrderConnection!

  # Invoices
  invoice(id: ID!): Invoice
  invoiceByNumber(invoiceNumber: String!): Invoice
  invoices(filter: InvoiceFilterInput, first: Int, after: String, last: Int, before: String): InvoiceConnection!
  overdueInvoices: [Invoice!]!

  # Catalog
  catalog(id: ID!): Catalog
  catalogs(supplierId: ID, active: Boolean): [Catalog!]!
  catalogItem(id: ID!): CatalogItem
  catalogItems(catalogId: ID, categoryId: ID, searchTerm: String, first: Int, after: String): CatalogItemConnection!

  # Optimization
  optimizationJob(id: ID!): OptimizationJob
  optimizationJobsForEvent(eventId: ID!): [OptimizationJob!]!

  # Analytics
  spendSummary(period: String!, categoryId: ID, supplierId: ID): SpendSummary!

  # Users & Org
  currentUser: User!
  user(id: ID!): User
  users(role: UserRole, active: Boolean): [User!]!
  organization(id: ID!): Organization

  # Categories
  categories(parentId: ID, level: Int): [Category!]!
  category(id: ID!): Category

  # Notifications
  myNotifications(unreadOnly: Boolean, first: Int, after: String): NotificationConnection!

  # Audit
  auditLogs(entityType: String!, entityId: ID!, first: Int, after: String): AuditLogConnection!
}

# ─── Mutation Root ────────────────────────────────────────────────────────────

type Mutation {
  # Sourcing Events
  createSourcingEvent(input: CreateSourcingEventInput!): SourcingEvent!
  updateSourcingEvent(id: ID!, input: UpdateSourcingEventInput!): SourcingEvent!
  deleteSourcingEvent(id: ID!): Boolean!
  publishSourcingEvent(id: ID!): SourcingEvent!
  closeSourcingEvent(id: ID!): SourcingEvent!
  cancelSourcingEvent(id: ID!, reason: String): SourcingEvent!
  inviteSupplierToEvent(eventId: ID!, supplierId: ID!): SourcingEvent!
  removeSupplierFromEvent(eventId: ID!, supplierId: ID!): SourcingEvent!

  # Bids
  submitBid(input: CreateBidInput!): Bid!
  updateBid(id: ID!, input: CreateBidInput!): Bid!
  withdrawBid(id: ID!, reason: String): Bid!

  # Award Scenarios
  createAwardScenario(eventId: ID!, name: String!, description: String): AwardScenario!
  approveAwardScenario(id: ID!, comments: String): AwardScenario!
  implementAwardScenario(id: ID!): AwardScenario!

  # Suppliers
  createSupplier(input: CreateSupplierInput!): Supplier!
  updateSupplier(id: ID!, input: UpdateSupplierInput!): Supplier!
  activateSupplier(id: ID!): Supplier!
  deactivateSupplier(id: ID!): Supplier!
  addSupplierCertification(supplierId: ID!, certification: SupplierCertificationInput!): SupplierCertification!
  evaluateSupplier(supplierId: ID!, evaluation: SupplierEvaluationInput!): SupplierEvaluation!

  # Contracts
  createContract(input: CreateContractInput!): Contract!
  updateContract(id: ID!, input: UpdateContractInput!): Contract!
  submitContractForApproval(id: ID!): Contract!
  approveContract(id: ID!, comments: String): Contract!
  rejectContract(id: ID!, comments: String!): Contract!
  terminateContract(id: ID!, reason: String!, effectiveDate: Date!): Contract!
  renewContract(id: ID!, newEndDate: Date!, newValue: Decimal): Contract!
  addContractAmendment(contractId: ID!, amendment: ContractAmendmentInput!): ContractAmendment!

  # Purchase Orders
  createPurchaseOrder(input: CreatePurchaseOrderInput!): PurchaseOrder!
  updatePurchaseOrder(id: ID!, input: CreatePurchaseOrderInput!): PurchaseOrder!
  submitPurchaseOrderForApproval(id: ID!): PurchaseOrder!
  approvePurchaseOrder(id: ID!, comments: String): PurchaseOrder!
  rejectPurchaseOrder(id: ID!, comments: String!): PurchaseOrder!
  sendPurchaseOrder(id: ID!): PurchaseOrder!
  cancelPurchaseOrder(id: ID!, reason: String!): PurchaseOrder!
  receiveItems(purchaseOrderId: ID!, receipt: ReceiptInput!): Receipt!

  # Invoices
  createInvoice(input: CreateInvoiceInput!): Invoice!
  submitInvoice(id: ID!): Invoice!
  approveInvoice(id: ID!, comments: String): Invoice!
  rejectInvoice(id: ID!, comments: String!): Invoice!
  recordPayment(invoiceId: ID!, payment: PaymentInput!): Payment!
  holdInvoice(id: ID!, reason: String!): Invoice!
  releaseInvoiceHold(id: ID!): Invoice!

  # Catalog
  createCatalog(name: String!, description: String, supplierId: ID): Catalog!
  updateCatalog(id: ID!, name: String, description: String, active: Boolean): Catalog!
  createCatalogItem(input: CreateCatalogItemInput!): CatalogItem!
  updateCatalogItem(id: ID!, input: CreateCatalogItemInput!): CatalogItem!
  deactivateCatalogItem(id: ID!): CatalogItem!

  # Optimization
  submitOptimizationJob(eventId: ID!, name: String!, parameters: JSON): OptimizationJob!
  cancelOptimizationJob(id: ID!): OptimizationJob!

  # Notifications
  markNotificationRead(id: ID!): Notification!
  markAllNotificationsRead: Boolean!
}

# ─── Additional Input Types ───────────────────────────────────────────────────

input ContractFilterInput {
  status: ContractStatus
  supplierId: ID
  categoryId: ID
  ownerId: ID
  startDateFrom: Date
  endDateTo: Date
  searchTerm: String
}

input SupplierCertificationInput {
  type: String!
  certificationNumber: String
  issuingBody: String
  issueDate: Date
  expiryDate: Date
}

input SupplierEvaluationInput {
  score: Decimal!
  qualityScore: Decimal
  deliveryScore: Decimal
  serviceScore: Decimal
  complianceScore: Decimal
  comments: String
  period: String
}

input ContractAmendmentInput {
  amendmentNumber: String!
  description: String!
  effectiveDate: Date!
  changes: String
}

input ReceiptInput {
  receivedDate: Date!
  lineItems: [ReceiptLineItemInput!]!
  notes: String
}

input ReceiptLineItemInput {
  lineItemId: ID!
  quantityReceived: Decimal!
  condition: String
  notes: String
}

input PaymentInput {
  paymentDate: Date!
  amount: Decimal!
  currency: Currency!
  paymentMethod: String
  referenceNumber: String
}

# ─── Additional Connection Types ─────────────────────────────────────────────

type CatalogItemConnection {
  edges: [CatalogItemEdge!]!
  pageInfo: PageInfo!
}

type CatalogItemEdge {
  cursor: String!
  node: CatalogItem!
}

type NotificationConnection {
  edges: [NotificationEdge!]!
  pageInfo: PageInfo!
}

type NotificationEdge {
  cursor: String!
  node: Notification!
}

type AuditLogConnection {
  edges: [AuditLogEdge!]!
  pageInfo: PageInfo!
}

type AuditLogEdge {
  cursor: String!
  node: AuditLog!
}
