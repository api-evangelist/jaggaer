  taxAmount: Money
  totalAmount: Money!
  currency: Currency!
  paymentTerms: String
  remittanceAddress: Address
  approvalWorkflow: ApprovalWorkflow
  payments: [Payment!]
  attachments: [Attachment!]
  notes: String
  submittedAt: DateTime
  approvedAt: DateTime
  paidAt: DateTime
  createdAt: DateTime!
  updatedAt: DateTime!
}

type InvoiceLineItem {
  id: ID!
  lineNumber: Int!
  description: String!
  quantity: Decimal!
  unitPrice: Money!
  totalPrice: Money!
  taxCode: String
  taxRate: Decimal
  purchaseOrderLineItem: LineItem
