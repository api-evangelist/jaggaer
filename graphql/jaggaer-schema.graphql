}

type ReceiptLineItem {
  lineItem: LineItem!
  quantityReceived: Decimal!
  condition: String
  notes: String
}

type PurchaseOrderConnection {
  edges: [PurchaseOrderEdge!]!
  pageInfo: PageInfo!
}

type PurchaseOrderEdge {
  cursor: String!
  node: PurchaseOrder!
}

