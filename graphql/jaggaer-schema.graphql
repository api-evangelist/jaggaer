"""
JAGGAER GraphQL Schema
Conceptual schema derived from the JAGGAER REST API covering procurement,
sourcing, contract management, supplier management, and accounts payable.
"""

# ─── Scalars ────────────────────────────────────────────────────────────────

scalar DateTime
scalar Date
scalar Decimal
scalar JSON
scalar Upload

# ─── Enums ──────────────────────────────────────────────────────────────────

enum EventStatus {
  DRAFT
  OPEN
  CLOSED
  AWARDED
  CANCELLED
  PENDING_APPROVAL
  APPROVED
  ARCHIVED
}

enum EventType {
  RFI
  RFP
  RFQ
  AUCTION
  REVERSE_AUCTION
  SEALED_BID
  MULTI_ROUND
}

enum BidStatus {
  DRAFT
  SUBMITTED
  ACKNOWLEDGED
  REVISED
  WITHDRAWN
  AWARDED
  NOT_AWARDED
}

enum SupplierStatus {
  ACTIVE
  INACTIVE
  PENDING
  SUSPENDED
  BLOCKED
  INVITED
  ONBOARDING
}

enum ContractStatus {
  DRAFT
  PENDING_APPROVAL
  ACTIVE
  EXPIRING_SOON
  EXPIRED
  TERMINATED
  RENEWED
}

enum PurchaseOrderStatus {
  DRAFT
  PENDING_APPROVAL
  APPROVED
  SENT
  ACKNOWLEDGED
  PARTIALLY_RECEIVED
  RECEIVED
  INVOICED
  CLOSED
  CANCELLED
}

enum InvoiceStatus {
  DRAFT
  SUBMITTED
  PENDING_APPROVAL
  APPROVED
  REJECTED
  PAID
  PARTIALLY_PAID
  CANCELLED
  ON_HOLD
}

enum CatalogItemStatus {
  ACTIVE
  INACTIVE
  PENDING_APPROVAL
  DISCONTINUED
  DRAFT
}

enum Currency {
  USD
  EUR
  GBP
  JPY
  CAD
  AUD
  CHF
  CNY
  INR
  BRL
  MXN
  SEK
  NOK
  DKK
  SGD
}

enum UserRole {
  ADMIN
  BUYER
  APPROVER
  VIEWER
  SUPPLIER
  CATEGORY_MANAGER
  CONTRACT_MANAGER
}

enum ApprovalStatus {
  PENDING
  APPROVED
  REJECTED
  RECALLED
  ESCALATED
}

enum LineItemType {
  GOODS
  SERVICES
  TRAVEL
  BLANKET
  MISCELLANEOUS
}

enum AwardScenarioStatus {
  DRAFT
  CALCULATED
  APPROVED
  IMPLEMENTED
}

enum OptimizationJobStatus {
  QUEUED
  RUNNING
  COMPLETED
  FAILED
  CANCELLED
}

enum NotificationChannel {
  EMAIL
  IN_APP
  SMS
  WEBHOOK
}

# ─── Core Supporting Types ───────────────────────────────────────────────────

type Address {
  street1: String
  street2: String
  city: String
  state: String
  postalCode: String
  country: String
  countryCode: String
}

type Money {
  amount: Decimal!
  currency: Currency!
}

type ContactInfo {
  firstName: String
  lastName: String
  email: String
  phone: String
  title: String
}

type Attachment {
  id: ID!
  fileName: String!
  fileSize: Int
  mimeType: String
  url: String
  uploadedAt: DateTime
  uploadedBy: User
}

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
  totalCount: Int
}

type AuditLog {
  id: ID!
  action: String!
  entityType: String!
  entityId: ID!
  performedBy: User
  performedAt: DateTime!
  previousValue: JSON
  newValue: JSON
  ipAddress: String
}

type ApprovalWorkflow {
  id: ID!
  name: String!
  steps: [ApprovalStep!]!
  currentStep: ApprovalStep
  status: ApprovalStatus!
  initiatedAt: DateTime
  completedAt: DateTime
}

type ApprovalStep {
  id: ID!
  stepNumber: Int!
  approver: User!
  status: ApprovalStatus!
  comments: String
  decidedAt: DateTime
}

type Category {
  id: ID!
  code: String!
  name: String!
  description: String
  parentCategory: Category
  childCategories: [Category!]
  level: Int!
  unspscCode: String
}

type Tag {
  id: ID!
  name: String!
  color: String
}

type CustomField {
  id: ID!
  name: String!
  fieldType: String!
  value: String
  required: Boolean!
}

# ─── User & Organization Types ───────────────────────────────────────────────

type Organization {
  id: ID!
  name: String!
  code: String
  type: String
  address: Address
  contactInfo: ContactInfo
  taxId: String
  duns: String
  active: Boolean!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type User {
  id: ID!
  username: String!
  email: String!
  firstName: String
  lastName: String
  fullName: String
  role: UserRole!
  organization: Organization
  department: String
  costCenter: String
  active: Boolean!
  lastLoginAt: DateTime
  createdAt: DateTime!
  updatedAt: DateTime!
  permissions: [String!]
}

# ─── Supplier Types ──────────────────────────────────────────────────────────

type Supplier {
  id: ID!
  code: String!
  name: String!
  legalName: String
  status: SupplierStatus!
  address: Address
  contactInfo: ContactInfo
  categories: [Category!]
  taxId: String
  duns: String
  website: String
  diversity: SupplierDiversity
  certifications: [SupplierCertification!]
  scorecard: SupplierScorecard
  contracts: [Contract!]
  purchaseOrders: [PurchaseOrder!]
  invoices: [Invoice!]
  qualificationStatus: String
  riskRating: String
  preferredStatus: Boolean!
  createdAt: DateTime!
  updatedAt: DateTime!
  customFields: [CustomField!]
}

type SupplierDiversity {
  isMinorityOwned: Boolean
  isWomanOwned: Boolean
  isVeteranOwned: Boolean
  isDisabilityOwned: Boolean
  isSmallBusiness: Boolean
  certificationDetails: String
}

type SupplierCertification {
  id: ID!
  type: String!
  certificationNumber: String
  issuingBody: String
  issueDate: Date
  expiryDate: Date
  status: String!
  documents: [Attachment!]
}

type SupplierScorecard {
  supplierId: ID!
  overallScore: Decimal
  qualityScore: Decimal
  deliveryScore: Decimal
  serviceScore: Decimal
  complianceScore: Decimal
  lastEvaluatedAt: DateTime
  evaluations: [SupplierEvaluation!]
}

type SupplierEvaluation {
  id: ID!
  evaluatorId: ID!
  evaluator: User
  score: Decimal!
  comments: String
  evaluatedAt: DateTime!
  period: String
}

type SupplierConnection {
  edges: [SupplierEdge!]!
  pageInfo: PageInfo!
}

type SupplierEdge {
  cursor: String!
  node: Supplier!
}

# ─── Sourcing / RFx Event Types ─────────────────────────────────────────────

type SourcingEvent {
  id: ID!
  eventNumber: String!
  title: String!
  description: String
  type: EventType!
  status: EventStatus!
  category: Category
  owner: User!
  startDate: DateTime
  endDate: DateTime
  awardDate: DateTime
  suppliers: [SourcingEventSupplier!]
  lots: [Lot!]
  attributes: [EventAttribute!]
  attachments: [Attachment!]
  approvalWorkflow: ApprovalWorkflow
  awardScenarios: [AwardScenario!]
  totalEstimatedValue: Money
  currency: Currency!
  createdAt: DateTime!
  updatedAt: DateTime!
  tags: [Tag!]
  customFields: [CustomField!]
}

type SourcingEventSupplier {
  supplier: Supplier!
  invitedAt: DateTime
  respondedAt: DateTime
  bid: Bid
  status: String!
}

type Lot {
  id: ID!
  lotNumber: Int!
  title: String!
  description: String
  lineItems: [LineItem!]
  estimatedValue: Money
  awardedTo: Supplier
}

type EventAttribute {
  id: ID!
  name: String!
  description: String
  attributeType: String!
  required: Boolean!
  options: [String!]
  weight: Decimal
  displayOrder: Int!
}

type Bid {
  id: ID!
  event: SourcingEvent!
  supplier: Supplier!
  status: BidStatus!
  submittedAt: DateTime
  totalValue: Money
  lineItems: [BidLineItem!]
  attachments: [Attachment!]
  responses: [BidResponse!]
  notes: String
  createdAt: DateTime!
  updatedAt: DateTime!
}

type BidLineItem {
  id: ID!
  lineItem: LineItem!
  unitPrice: Money
  quantity: Decimal
  totalPrice: Money
  leadTimeDays: Int
  notes: String
}

type BidResponse {
  attribute: EventAttribute!
  responseValue: String
  score: Decimal
}

type AwardScenario {
  id: ID!
  name: String!
  status: AwardScenarioStatus!
  description: String
  totalAwardValue: Money
  savings: Money
  savingsPercent: Decimal
  awards: [Award!]
  createdAt: DateTime!
  approvedAt: DateTime
  approvedBy: User
}

type Award {
  id: ID!
  supplier: Supplier!
  lot: Lot
  lineItems: [LineItem!]
  awardValue: Money
  rationale: String
}

type SourcingEventConnection {
  edges: [SourcingEventEdge!]!
  pageInfo: PageInfo!
}

type SourcingEventEdge {
  cursor: String!
  node: SourcingEvent!
}

# ─── Contract Types ──────────────────────────────────────────────────────────

type Contract {
  id: ID!
  contractNumber: String!
  title: String!
  description: String
  status: ContractStatus!
  type: String
  supplier: Supplier!
  owner: User!
  category: Category
  startDate: Date
  endDate: Date
  totalValue: Money
  currency: Currency!
  paymentTerms: String
  lineItems: [ContractLineItem!]
  attachments: [Attachment!]
  approvalWorkflow: ApprovalWorkflow
  renewalNotificationDays: Int
  autoRenew: Boolean
  parentContract: Contract
  amendments: [ContractAmendment!]
  milestones: [ContractMilestone!]
  createdAt: DateTime!
  updatedAt: DateTime!
  customFields: [CustomField!]
}

type ContractLineItem {
  id: ID!
  description: String!
  quantity: Decimal
  unitPrice: Money
  totalValue: Money
  category: Category
}

type ContractAmendment {
  id: ID!
  amendmentNumber: String!
  description: String!
  effectiveDate: Date!
  changes: String
  approvedAt: DateTime
  approvedBy: User
}

type ContractMilestone {
  id: ID!
  title: String!
  dueDate: Date!
  completedDate: Date
  status: String!
  description: String
}

type ContractConnection {
  edges: [ContractEdge!]!
  pageInfo: PageInfo!
}

type ContractEdge {
  cursor: String!
  node: Contract!
}

# ─── Purchase Order Types ────────────────────────────────────────────────────

type PurchaseOrder {
  id: ID!
  poNumber: String!
  title: String
  status: PurchaseOrderStatus!
  supplier: Supplier!
  requester: User!
  approver: User
  contract: Contract
  lineItems: [LineItem!]
  deliveryAddress: Address
  billingAddress: Address
  currency: Currency!
  subtotal: Money
  taxAmount: Money
  totalAmount: Money!
  paymentTerms: String
  deliveryDate: Date
  approvalWorkflow: ApprovalWorkflow
  receipts: [Receipt!]
  invoices: [Invoice!]
  attachments: [Attachment!]
  notes: String
  createdAt: DateTime!
  updatedAt: DateTime!
  sentAt: DateTime
  acknowledgedAt: DateTime
  customFields: [CustomField!]
}

type LineItem {
  id: ID!
  lineNumber: Int!
  description: String!
  type: LineItemType!
  quantity: Decimal!
  unitOfMeasure: String
  unitPrice: Money
  totalPrice: Money
  category: Category
  catalogItem: CatalogItem
  deliveryDate: Date
  notes: String
}

type Receipt {
  id: ID!
  receiptNumber: String!
