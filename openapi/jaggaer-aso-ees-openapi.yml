          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /event/{event-id}/user/{user-id}/entity/{entity}/uploadUrl:
    get:
      operationId: getUploadUrl
      summary: Upload Entity URL
      description: >
        Retrieves a pre-signed upload URL for the specified entity type,
        enabling upload of data files to the ASO platform for the given
        event and user.
      tags:
        - Uploads
      parameters:
        - $ref: '#/components/parameters/eventId'
        - $ref: '#/components/parameters/userId'
        - name: entity
          in: path
          required: true
          description: The entity type for which an upload URL is requested.
          schema:
            type: string
      responses:
        '200':
          description: Success; returns a pre-signed upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: OAuth 2.0 bearer token for authentication.
    apiKeyHeader:
      type: apiKey
      in: header
      name: X-Api-Key
      description: API key passed as a request header.
  parameters:
    eventId:
      name: event-id
      in: path
      required: true
      description: Identifier for the sourcing event.
      schema:
        type: integer
    userId:
      name: user-id
      in: path
      required: true
      description: Identifier for the user.
      schema:
        type: integer
    attributeId:
      name: attribute-id
      in: path
      required: true
      description: Identifier for the event attribute.
      schema:
        type: integer
    contactId:
      name: contact-id
      in: path
      required: true
      description: Identifier for the contact.
      schema:
        type: integer
    itemId:
      name: item-id
      in: path
      required: true
      description: Identifier for the line item.
      schema:
        type: integer
    supplierId:
      name: supplier-id
      in: path
      required: true
      description: Identifier for the supplier.
      schema:
        type: integer
  responses:
    Unauthorized:
      description: >
        Authentication failed. Ensure a valid OAuth 2.0 bearer token and
        API key are provided.
    NotFound:
      description: The requested resource was not found.
    UnprocessableEntity:
      description: >
        The request was syntactically valid but could not be processed due
        to validation errors.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    AsyncStatusResponse:
      type: object
      description: Status response for an asynchronous process.
      properties:
        status:
          type: string
          description: Current status of the asynchronous process.
          enum:
            - PENDING
            - IN_PROGRESS
            - COMPLETED
            - FAILED
        downloadUrl:
          type: string
          format: uri
          description: >
            Pre-signed URL for downloading the result when the process has
            completed.
        errorMessage:
          type: string
          description: Error message if the process failed.
    AsyncAcceptedResponse:
      type: object
      description: Response returned when an asynchronous operation is accepted.
      properties:
        encodedAsyncPid:
          type: string
          description: Base64-encoded process ID used to poll for status.
    AttributeResponse:
      type: object
      description: Sourcing event attribute details.
      properties:
        attributeId:
          type: integer
          description: Unique identifier for the attribute.
        attributeName:
          type: string
          description: Name of the attribute.
        attributeType:
          type: string
          description: Type classification of the attribute.
        value:
          type: string
          description: Current value of the attribute.
    AttributeListResponse:
      type: object
      description: List of sourcing event attributes.
      properties:
        attributes:
          type: array
          items:
            $ref: '#/components/schemas/AttributeResponse'
    AttributeCreateRequest:
      type: object
      description: Request body for creating an event attribute.
      required:
        - attributeName
        - attributeType
      properties:
        attributeName:
          type: string
        attributeType:
          type: string
        value:
          type: string
    AttributeUpdateRequest:
      type: object
      description: Request body for updating an event attribute.
      properties:
        value:
          type: string
    AttributeBulkUpdateRequest:
      type: object
      description: Request body for bulk updating event attributes.
      properties:
        attributes:
          type: array
          items:
            $ref: '#/components/schemas/AttributeUpdateRequest'
    ContactResponse:
      type: object
      description: Event contact details.
      properties:
        contactId:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        supplierId:
          type: integer
    ContactListResponse:
      type: object
      description: List of event contacts.
      properties:
        contacts:
          type: array
          items:
            $ref: '#/components/schemas/ContactResponse'
    ContactCreateRequest:
      type: object
      description: Request body for creating an event contact.
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
    ContactUpdateRequest:
      type: object
      description: Request body for updating an event contact.
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
    ContactBulkUpdateRequest:
      type: object
      description: Request body for bulk updating event contacts.
      properties:
        contacts:
          type: array
          items:
            $ref: '#/components/schemas/ContactUpdateRequest'
    ItemResponse:
      type: object
      description: Sourcing event line item details.
      properties:
        itemId:
          type: integer
          description: Unique identifier for the line item.
        itemName:
          type: string
          description: Name of the line item.
        quantity:
          type: number
          description: Requested quantity.
        unitOfMeasure:
          type: string
          description: Unit of measure for the item.
    ItemListResponse:
      type: object
      description: List of event line items.
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ItemResponse'
    ItemCreateRequest:
      type: object
      description: Request body for creating event line items.
      properties:
        itemName:
          type: string
        quantity:
          type: number
        unitOfMeasure:
          type: string
    ItemUpdateRequest:
      type: object
      description: Request body for updating an event line item.
      properties:
        itemName:
          type: string
        quantity:
          type: number
        unitOfMeasure:
          type: string
    ItemBulkUpdateRequest:
      type: object
      description: Request body for bulk updating event line items.
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ItemUpdateRequest'
    RateResponse:
      type: object
      description: Sourcing event rate details.
      properties:
        rateId:
          type: integer
          description: Unique identifier for the rate.
        rateName:
          type: string
          description: Name of the rate.
        locationName:
          type: string
          description: Location associated with the rate.
        value:
          type: number
          description: Rate value.
    ScenarioListResponse:
      type: object
      description: List of award scenarios.
      properties:
        scenarios:
          type: array
          items:
            type: object
            properties:
              scenarioId:
                type: integer
              scenarioName:
                type: string
              isPreferred:
                type: boolean
    SupplierResponse:
      type: object
      description: Sourcing event supplier details.
      properties:
        supplierId:
          type: integer
          description: Unique identifier for the supplier.
        supplierName:
          type: string
          description: Name of the supplier.
        status:
          type: string
          description: Participation status of the supplier in the event.
    SupplierListResponse:
      type: object
      description: List of event suppliers.
      properties:
        suppliers:
          type: array
          items:
            $ref: '#/components/schemas/SupplierResponse'
    SupplierCreateRequest:
      type: object
      description: Request body for adding suppliers to an event.
      properties:
        suppliers:
          type: array
          items:
            type: object
            properties:
              supplierId:
                type: integer
    SupplierUpdateRequest:
      type: object
      description: Request body for updating a supplier.
      properties:
        status:
          type: string
    SupplierBulkUpdateRequest:
      type: object
      description: Request body for bulk updating suppliers.
      properties:
        suppliers:
          type: array
          items:
            $ref: '#/components/schemas/SupplierUpdateRequest'
    UploadUrlResponse:
      type: object
      description: Pre-signed upload URL response.
      properties:
        uploadUrl:
          type: string
          format: uri
          description: Pre-signed URL for uploading entity data.
        expiresAt:
          type: string
          format: date-time
          description: Expiration time for the pre-signed URL.
    ErrorResponse:
      type: object
      description: Error response with validation details.
      properties:
        statuses:
          type: object
          description: Map of status codes to arrays of status detail objects.
          additionalProperties:
            type: array
            items:
              type: object
              additionalProperties:
                type: string
