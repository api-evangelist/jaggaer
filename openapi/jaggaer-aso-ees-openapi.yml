                $ref: '#/components/schemas/AsyncAcceptedResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /event/{event-id}/bidRound/{bid-round}/apiBids/async:
    get:
      operationId: getBidsByBidRoundAsync
      summary: Bids by Bid Round (Asynchronous)
      description: >
        Initiates an asynchronous retrieval of bids for the specified bid
