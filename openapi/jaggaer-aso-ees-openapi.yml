              schema:
                $ref: '#/components/schemas/AsyncAcceptedResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /event/{event-id}/apiScenarios:
    get:
      operationId: getScenarios
      summary: Scenarios
      description: Retrieves all award scenarios for the given sourcing event.
      tags:
        - Scenarios
      parameters:
        - $ref: '#/components/parameters/eventId'
      responses:
        '200':
          description: Success; returns list of scenarios.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /event/{event-id}/apiSupplier/{supplier-id}:
    get:
      operationId: getSupplier
      summary: Supplier
      description: Retrieves a specific supplier for the given sourcing event.
      tags:
        - Suppliers
      parameters:
        - $ref: '#/components/parameters/eventId'
        - $ref: '#/components/parameters/supplierId'
      responses:
        '200':
          description: Success; returns supplier details.
          content:
