        '404':
          $ref: '#/components/responses/NotFound'
  /event/{event-id}/apiRates/async:
    get:
      operationId: getRatesAsync
      summary: Rates (Asynchronous)
      description: >
        Initiates an asynchronous retrieval of all rates for the given event.
        Returns a process ID for polling via /asyncStatus/{encoded-async-pid}.
      tags:
        - Rates
      parameters:
        - $ref: '#/components/parameters/eventId'
      responses:
        '202':
