openapi: 3.0.3
info:
  title: JAGGAER ASO Event Entity Service API
  description: >
    The Event Entity Service (EES) API provides REST endpoints for managing
    sourcing events within the JAGGAER Advanced Sourcing Optimizer, including
    event attributes, bids, contacts, items, rates, scenarios, and suppliers.
    It supports asynchronous operations for retrieving large datasets such as
    bid submissions and award results, with pre-signed download URLs for
    completed asynchronous processes. Authentication requires both OAuth 2.0
    bearer tokens and API key headers.
  version: v26.1.0.9
  contact:
    name: JAGGAER Support
    url: https://www.jaggaer.com/support
  x-api-id: jaggaer-aso-ees
servers:
  - url: https://ees.aso-api.jaggaer.com
    description: JAGGAER ASO EES Production Server
tags:
  - name: Async
    description: Asynchronous process status operations
  - name: Attributes
    description: Event attribute management
  - name: Awards
    description: Award scenario retrieval
  - name: Bids
    description: Bid submission retrieval
  - name: Contacts
    description: Event contact management
  - name: Items
    description: Event item management
  - name: Rates
    description: Event rate retrieval
  - name: Scenarios
    description: Event scenario retrieval
  - name: Suppliers
    description: Event supplier management
  - name: Uploads
    description: Entity upload URL generation
security:
  - bearerAuth: []
    apiKeyHeader: []
paths:
  /asyncStatus/{encoded-async-pid}:
    get:
      operationId: getAsyncStatus
      summary: Async Status
      description: >
        Returns the status and status-specific data for an asynchronous file
        process. When the process is complete, a pre-signed download URL is
        returned for retrieving the result data.
      tags:
        - Async
      parameters:
        - name: encoded-async-pid
          in: path
          required: true
          description: Base64-encoded asynchronous process identifier.
          schema:
            type: string
      responses:
        '200':
          description: >
            Success; returns status and optional download URL for the async
            process.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncStatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /event/{event-id}/apiAttribute/{attribute-id}:
    get:
      operationId: getAttribute
      summary: Attribute
      description: Retrieves a specific attribute for the given sourcing event.
      tags:
        - Attributes
      parameters:
        - $ref: '#/components/parameters/eventId'
        - $ref: '#/components/parameters/attributeId'
      responses:
        '200':
          description: Success; returns the attribute details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttributeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateAttribute
      summary: Update Attribute
      description: Updates a specific attribute for the given sourcing event.
      tags:
        - Attributes
      parameters:
        - $ref: '#/components/parameters/eventId'
        - $ref: '#/components/parameters/attributeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttributeUpdateRequest'
      responses:
        '200':
          description: Success; attribute updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttributeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
    delete:
      operationId: deleteAttribute
      summary: Delete Attribute
      description: Deletes a specific attribute from the given sourcing event.
      tags:
        - Attributes
      parameters:
        - $ref: '#/components/parameters/eventId'
        - $ref: '#/components/parameters/attributeId'
      responses:
        '204':
          description: Success; attribute deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /event/{event-id}/apiAttributes:
    get:
      operationId: getAttributes
      summary: Attributes
      description: Retrieves all attributes for the given sourcing event.
      tags:
        - Attributes
      parameters:
        - $ref: '#/components/parameters/eventId'
      responses:
        '200':
          description: Success; returns a list of attributes.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttributeListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      operationId: createAttribute
      summary: Create Attribute
      description: Creates a new attribute for the given sourcing event.
      tags:
        - Attributes
      parameters:
        - $ref: '#/components/parameters/eventId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttributeCreateRequest'
      responses:
        '200':
          description: Success; attribute created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttributeResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
    patch:
      operationId: updateAttributes
      summary: Update Attributes (Bulk)
      description: Bulk updates multiple attributes for the given sourcing event.
      tags:
        - Attributes
      parameters:
        - $ref: '#/components/parameters/eventId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttributeBulkUpdateRequest'
      responses:
        '200':
          description: Success; attributes updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttributeListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /event/{event-id}/attributeType/{attribute-type}/apiAttributes:
    get:
      operationId: getAttributesByType
      summary: Attributes by Type
      description: >
        Retrieves all attributes of the specified type for the given sourcing
        event.
      tags:
        - Attributes
      parameters:
        - $ref: '#/components/parameters/eventId'
        - name: attribute-type
          in: path
          required: true
          description: The attribute type filter.
          schema:
            type: string
      responses:
        '200':
          description: Success; returns attributes filtered by type.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttributeListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /event/{event-id}/scenario/preferred/apiAwards/async:
    get:
      operationId: getAwardsByPreferredScenarioAsync
      summary: Awards by Preferred Scenario (Asynchronous)
      description: >
        Initiates an asynchronous retrieval of awards for the preferred
        scenario of the given event. Returns a process ID for polling
        via /asyncStatus/{encoded-async-pid}.
      tags:
        - Awards
      parameters:
        - $ref: '#/components/parameters/eventId'
      responses:
        '202':
          description: Accepted; returns process ID for async polling.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncAcceptedResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /event/{event-id}/scenario/{scenario-id}/apiAwards/async:
    get:
      operationId: getAwardsByScenarioAsync
      summary: Awards by Scenario (Asynchronous)
      description: >
        Initiates an asynchronous retrieval of awards for the specified
        scenario of the given event. Returns a process ID for polling
        via /asyncStatus/{encoded-async-pid}.
      tags:
        - Awards
      parameters:
        - $ref: '#/components/parameters/eventId'
        - name: scenario-id
          in: path
          required: true
          description: Identifier for the award scenario.
          schema:
            type: integer
      responses:
        '202':
          description: Accepted; returns process ID for async polling.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncAcceptedResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /event/{event-id}/apiBids/async:
    get:
      operationId: getBidsAsync
      summary: Bids (Asynchronous)
      description: >
        Initiates an asynchronous retrieval of all bids for the given event.
        Returns a process ID for polling via /asyncStatus/{encoded-async-pid}.
      tags:
        - Bids
      parameters:
        - $ref: '#/components/parameters/eventId'
      responses:
        '202':
          description: Accepted; returns process ID for async polling.
          content:
            application/json:
